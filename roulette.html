<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Roulette</title>
  <link rel="stylesheet" href="format.css">
</head>
<body>
  <div class="menu">
    <div class="status-bar">
      <button id="esc">Menu</button>
      <div>Credits: <span id="credits">0</span></div>
      <div>Einsatz: <span id="bet-display">0</span></div>
    </div>

    <div class="roulette-wheel" id="wheel">0</div>

    <p id="message">Platziere deine Wette!</p>

    <div class ="controls">
      <span class="bet-label">Einsatz</span>
    </div>
    <div style="display:flex; gap:12px;">
    <div class="controls1">
      <button id="bet-minus-10">-10</button>
      <button id="bet-minus-100">-100</button>
      <button id="bet-minus-1000">-1000</button>
      <button id="bet-minus-/2">/ 2</button>
      <button id="bet-minus-Min">Min</button>
      
    </div>
    <div class="controls1">
      <button id="bet-plus-10">+10</button>
      <button id="bet-plus-100">+100</button>
      <button id="bet-plus-1000">+1000</button>
      <button id="bet-plus-x2">x2</button>
      <button id="bet-plus-Max">Max</button>
    </div>
    </div>

    <div class="bet-type">
      <label><input type="radio" name="bet-type" value="color" checked> Farbe</label>
      <label><input type="radio" name="bet-type" value="parity"> Gerade/Ungerade</label>
      <label><input type="radio" name="bet-type" value="number"> Zahl</label>
    </div>

    <div class="bet-options" id="color-options">
      <button class="bet-choice" data-choice="red">Rot</button>
      <button class="bet-choice" data-choice="black">Schwarz</button>
    </div>

    <div class="bet-options" id="parity-options" style="display:none;">
      <button class="bet-choice" data-choice="even">Gerade</button>
      <button class="bet-choice" data-choice="odd">Ungerade</button>
    </div>

    <div class="bet-options" id="number-options" style="display:none;">
      <input type="number" id="number-input" min="0" max="36" value="0">
    </div>

    <button id="spin-btn">Spin</button>
  </div>

  <script src="highscore.js"></script>
  <script src="roulette.js"></script>
</body>
</html>
