<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Slot Maschine</title>
  <link rel="stylesheet" href="format.css">
</head>
<body>
  <div class="slot-machine">
    <div class="status-bar">
      <button id="esc"> Menu</button>
      <div>Guthaben: <span id="credits"></span></div>
      <div>Einsatz: <span id="bet-display">10</span></div>
    </div>

    <div class="reels">
      <div class="reel-window" id="reel0">7</div>
      <div class="reel-window" id="reel1">7</div>
      <div class="reel-window" id="reel2">7</div>
    </div>

    <p id="message">Viel Glück!</p>

    <div class ="controls">
      <span class="bet-label">Einsatz</span>
    </div>
    <div style="display:flex; gap:12px;">
    <div class="controls1">
      <button id="bet-minus-10">-10</button>
      <button id="bet-minus-100">-100</button>
      <button id="bet-minus-1000">-1000</button>
      <button id="bet-minus-/2">/ 2</button>
      <button id="bet-minus-Min">Min</button>
    </div>
    <div class="controls1">
     <button id="bet-plus-10">+10</button>
      <button id="bet-plus-100">+100</button>
      <button id="bet-plus-1000">+1000</button>
      <button id="bet-plus-x2">x2</button>
      <button id="bet-plus-Max">Max</button>
    </div>
    </div>
    <div class="controls2">
      <button id="spin-btn">Spin</button>
  </div>

  <script src="slots.js"></script>
</body>
</html>
